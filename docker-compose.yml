version: "3.9"

# ── Qdrant vector store (optional — only needed if VECTOR_STORE_TYPE=qdrant) ──
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: healthcare_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

volumes:
  qdrant_data:
